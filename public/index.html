<!DOCTYPE html>

<style>

<body>
<div id="game-wrap">
  <canvas id="c"></canvas>
  <div id="countertoolbox">
    <div id="toolbox-title" style="color:#a8e0b8">Counter</div>
    <!-- Counter buttons are injected by JS -->
  </div>
  <div id="toolbox">
    <div id="toolbox-title">Build</div>
    <!-- Piece buttons are injected by JS -->
  </div>
  <div id="hud">tide: rising · 0%</div>
  <div id="version-badge"></div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const hud    = document.getElementById('hud');
const GAME_VER = 'v0.8.5'; // ← single source of truth, shown in corner badge
document.getElementById('version-badge').textContent = GAME_VER;

// ── CANVAS SIZE — change 740/520 to resize the game window ──────
const SW = window.innerWidth;
const SH = window.innerHeight;
canvas.width = SW; canvas.height = SH;

// ── Noise ─────────────────────────────────────────────────────────
function fade(t){return t*t*t*(t*(t*6-15)+10);}
function lerp(a,b,t){return a+(b-a)*t;}
const PERM=new Uint8Array(512);
(()=>{const p=new Uint8Array(256);for(let i=0;i<256;i++)p[i]=i;
  for(let i=255;i>0;i--){const j=Math.random()*i|0;[p[i],p[j]]=[p[j],p[i]];}
  for(let i=0;i<512;i++)PERM[i]=p[i&255];})();
function grad2(h,x,y){const u=h<4?x:y,v=h<4?y:x;return((h&1)?-u:u)+((h&2)?-v:v);}
function noise2(x,y){
  const X=Math.floor(x)&255,Y=Math.floor(y)&255;
  x-=Math.floor(x);y-=Math.floor(y);
  const u=fade(x),v=fade(y),a=PERM[X]+Y,b=PERM[X+1]+Y;
  return lerp(lerp(grad2(PERM[a]&7,x,y),grad2(PERM[b]&7,x-1,y),u),
              lerp(grad2(PERM[a+1]&7,x,y-1),grad2(PERM[b+1]&7,x-1,y-1),u),v);
}
function fbm(x,y,oct){
  let v=0,amp=0.5,freq=1,mx=0;
  for(let i=0;i<oct;i++){v+=noise2(x*freq,y*freq)*amp;mx+=amp;amp*=0.5;freq*=2;}
  return v/mx;
}

// ── ISO GRID ──────────────────────────────────────────────────────
const GCOLS = 16, GROWS = 16;
const TW_BASE = 56, TH_BASE = 28; // base tile size — scaled by camZoom

// Auto-fit: scale the grid to fill the space between the two side panels
const _GRID_DIAG = GCOLS + GROWS; // diagonal tile span (32)
// Usable width = screen minus the two 72px side panels (+margins),
// clamped so narrow phone screens don't over-shrink the grid
const _PANEL_W = 80;
const _FIT_W   = Math.max(SW * 0.60, SW - _PANEL_W * 2);
const _FIT_ZOOM = Math.min(
  (_FIT_W * 0.96) / (_GRID_DIAG * TW_BASE / 2),
  (SH * 0.80)     / (_GRID_DIAG * TH_BASE / 2)
);
const OX = SW * 0.5;
const OY = (SH - _GRID_DIAG * TH_BASE * _FIT_ZOOM / 2) * 0.45; // 0.45 centers vertically (was 0.32 — sat too high)

// ── ZOOM ──────────────────────────────────────────────────────────
// camZoom: live scale multiplier applied to tile size in iso()
// ZOOM_MIN/MAX: pinch-to-zoom limits
// ← TWEAK: ZOOM_SMOOTH controls how snappily zoom settles
let camZoom      = _FIT_ZOOM;   // current zoom
let camZoomDest  = _FIT_ZOOM;   // target zoom (smoothed toward)
const ZOOM_MIN   = 0.45;  // ← TWEAK: most zoomed out
const ZOOM_MAX   = 2.2;   // ← TWEAK: most zoomed in
const ZOOM_SMOOTH = 0.14; // ← TWEAK: easing speed

// Derived tile sizes — always use these, never TW_BASE directly
function TW() { return TW_BASE * camZoom; }
function TH() { return TH_BASE * camZoom; }

// ── ORBIT CAMERA ──────────────────────────────────────────────────
// camAngle: current rotation in radians (0 = default iso view)
// camAngle is modified by drag gestures — left drag = counter-clockwise,
// right drag = clockwise.
// Castle center (BC+1.5, BR+1.5) is the pivot point.
// ← TWEAK: ORBIT_SENSITIVITY controls how fast a drag rotates the view
let camAngle       = 0;          // current camera angle (radians)
let camAngleDest   = 0;          // target angle (smoothed toward)
let orbitDragging  = false;      // true while drag-to-orbit is active
let orbitLastX     = 0;          // last drag X position
let orbitActive    = false;      // true when NOT using toolbox drag

const ORBIT_SENSITIVITY = 0.008; // ← TWEAK: drag pixels → radians
const ORBIT_SMOOTH      = 0.12;  // ← TWEAK: 0=instant, 1=never arrives
const ORBIT_PIVOT_C     = 5.5;   // castle center col (BC+1.5 = 3+1.5+1 for keep)
const ORBIT_PIVOT_R     = 5.5;   // castle center row (BR+1.5)

// Rotate a grid position around the pivot by camAngle
function rotateGrid(col, row) {
  const dc = col - ORBIT_PIVOT_C;
  const dr = row - ORBIT_PIVOT_R;
  const cos = Math.cos(camAngle);
  const sin = Math.sin(camAngle);
  return {
    col: ORBIT_PIVOT_C + dc * cos - dr * sin,
    row: ORBIT_PIVOT_R + dc * sin + dr * cos,
  };
}

// ── iso() now routes through camera rotation + zoom ───────────────
function iso(col, row, z) {
  const r = rotateGrid(col, row);
  const tw = TW(), th = TH();
  return {
    x: OX + (r.col - r.row) * (tw / 2),
    y: OY + (r.col + r.row) * (th / 2) - (z || 0) * th,
  };
}

// ── Orbit drag — pointer events on canvas ─────────────────────────
// Only activates when no piece is selected (selectedPiece === null)
// so it doesn't conflict with placement drag.
canvas.addEventListener('mousedown', e => {
  if (selectedPiece || selectedCounter) return; // toolbox drag takes priority
  orbitDragging = true;
  orbitLastX = e.clientX;
});

window.addEventListener('mousemove', e => {
  if (!orbitDragging) return;
  const dx = e.clientX - orbitLastX;
  camAngleDest += dx * ORBIT_SENSITIVITY;
  orbitLastX = e.clientX;
});

window.addEventListener('mouseup', () => { orbitDragging = false; });

// Touch orbit + pinch-to-zoom
// 1 finger = orbit, 2 fingers = pinch zoom
let pinchLastDist = 0;

canvas.addEventListener('touchstart', e => {
  if (selectedPiece || selectedCounter) return;
  if (e.touches.length === 1) {
    orbitDragging = true;
    orbitLastX = e.touches[0].clientX;
  } else if (e.touches.length === 2) {
    orbitDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchLastDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: true });

window.addEventListener('touchmove', e => {
  if (selectedPiece) return;

  if (e.touches.length === 2) {
    // Pinch zoom
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (pinchLastDist > 0) {
      const scale = dist / pinchLastDist;
      camZoomDest = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, camZoomDest * scale));
    }
    pinchLastDist = dist;
    orbitDragging = false;
  } else if (e.touches.length === 1 && orbitDragging) {
    // Single finger orbit
    const dx = e.touches[0].clientX - orbitLastX;
    camAngleDest += dx * ORBIT_SENSITIVITY;
    orbitLastX = e.touches[0].clientX;
  }
}, { passive: false });

window.addEventListener('touchend', e => {
  if (e.touches.length < 2) pinchLastDist = 0;
  if (e.touches.length === 0) orbitDragging = false;
});

// Mouse wheel zoom (desktop)
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.92 : 1.09; // scroll down = zoom out
  camZoomDest = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, camZoomDest * delta));
}, { passive: false });

// ── HUD orbit hint ────────────────────────────────────────────────
// Small label showing current angle and drag hint, shown in HUD.
function orbitHudStr() {
  const deg = ((camAngle * 180 / Math.PI) % 360 + 360) % 360;
  return `cam: ${Math.round(deg)}°`;
}

// ── TIDE SETTINGS ─────────────────────────────────────────────────
const SHORE_LOW  = 22;
let tidePhase    = 0;
let tideSpeed    = 0.0035;
let tidePeak     = 10;
let shoreD       = 22;
let lastTideSign = 1;

function getTideT(){ return (Math.sin(tidePhase)+1)/2; }

function randomizeTideCycle() {
  tideSpeed = 0.002 + Math.random() * 0.005;
  tidePeak  = 3 + Math.random() * 11;
}

let edgeTime = 0;

function getShoreOffset(col, row, t) {
  return fbm(col * 0.6 + t * 0.35, row * 0.6 + t * 0.25, 3) * 2.2;
}

function isTileWater(col, row) {
  const d = col + row + getShoreOffset(col, row, edgeTime);
  return d > shoreD;
}

function isShore(col, row) {
  const d = col + row + getShoreOffset(col, row, edgeTime);
  return d >= shoreD - 1.5 && d <= shoreD + 1.5;
}

// ── WATER COLOR ───────────────────────────────────────────────────
const wCanvas = document.createElement('canvas');
wCanvas.width = SW; wCanvas.height = SH;
const wCtx = wCanvas.getContext('2d');

function buildWaterTex(t) {
  const imgd = wCtx.createImageData(SW, SH);
  for (let sy = 0; sy < SH; sy++) {
    for (let sx = 0; sx < SW; sx++) {
      const wx = sx / SW, wy = sy / SH;
      const n1 = fbm(wx*6 + t*0.11, wy*6 - t*0.08, 3);
      const n2 = fbm(wx*11 - t*0.07, wy*11 + t*0.10, 2);
      const n  = n1*0.6 + n2*0.4;
      const dx = wx - 0.5, dy = wy - 0.08;
      const bloom = Math.max(0, 1 - Math.sqrt(dx*dx*1.8 + dy*dy*4)*2.0);
      const base = 0.3 + n*0.45 + bloom*0.4;
      const r = Math.min(255, (15  + base*35  + bloom*55)|0);
      const g = Math.min(255, (50  + base*65  + bloom*45)|0);
      const b = Math.min(255, (130 + base*90  + bloom*70)|0);
      const idx = (sy*SW+sx)*4;
      imgd.data[idx]=r; imgd.data[idx+1]=g; imgd.data[idx+2]=b; imgd.data[idx+3]=255;
    }
  }
  wCtx.putImageData(imgd, 0, 0);
}

// ── Sand texture offscreen ────────────────────────────────────────
const sCanvas = document.createElement('canvas');
sCanvas.width = SW; sCanvas.height = SH;
const sCtx2 = sCanvas.getContext('2d');
(()=>{
  const imgd = sCtx2.createImageData(SW, SH);
  for (let sy=0;sy<SH;sy++) for(let sx=0;sx<SW;sx++){
    const n = fbm(sx/90,sy/90,3)*0.5+0.5;
    const base = 210 + n*22|0;
    const idx=(sy*SW+sx)*4;
    imgd.data[idx]  =Math.min(255,base+8);
    imgd.data[idx+1]=Math.min(255,(base*0.83)|0);
    imgd.data[idx+2]=Math.min(255,(base*0.52)|0);
    imgd.data[idx+3]=255;
  }
  sCtx2.putImageData(imgd,0,0);
})();

function drawTileTop(col, row, fillStyle, alpha) {
  const p  = iso(col,   row,   0);
  const pr = iso(col+1, row,   0);
  const pb = iso(col+1, row+1, 0);
  const pf = iso(col,   row+1, 0);
  ctx.save();
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  ctx.fillStyle = fillStyle;
  ctx.beginPath();
  ctx.moveTo(p.x,p.y); ctx.lineTo(pr.x,pr.y);
  ctx.lineTo(pb.x,pb.y); ctx.lineTo(pf.x,pf.y);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function clipTilePath(col, row) {
  const p  = iso(col,   row,   0);
  const pr = iso(col+1, row,   0);
  const pb = iso(col+1, row+1, 0);
  const pf = iso(col,   row+1, 0);
  ctx.beginPath();
  ctx.moveTo(p.x,p.y); ctx.lineTo(pr.x,pr.y);
  ctx.lineTo(pb.x,pb.y); ctx.lineTo(pf.x,pf.y);
  ctx.closePath();
}

function isoBlock(col, row, z, h, topC, leftC, rightC) {
  const p  = iso(col,   row,   z+h), pr = iso(col+1,row,   z+h);
  const pf = iso(col,   row+1, z+h), pb = iso(col+1,row+1, z+h);
  const p0 = iso(col,   row,   z),   pr0= iso(col+1,row,   z);
  const pf0= iso(col,   row+1, z),   pb0= iso(col+1,row+1, z);

  ctx.fillStyle=topC; ctx.beginPath();
  ctx.moveTo(p.x,p.y);ctx.lineTo(pr.x,pr.y);ctx.lineTo(pb.x,pb.y);ctx.lineTo(pf.x,pf.y);
  ctx.closePath();ctx.fill();
  ctx.fillStyle=leftC; ctx.beginPath();
  ctx.moveTo(pf.x,pf.y);ctx.lineTo(pb.x,pb.y);ctx.lineTo(pb0.x,pb0.y);ctx.lineTo(pf0.x,pf0.y);
  ctx.closePath();ctx.fill();
  ctx.fillStyle=rightC; ctx.beginPath();
  ctx.moveTo(pr.x,pr.y);ctx.lineTo(pb.x,pb.y);ctx.lineTo(pb0.x,pb0.y);ctx.lineTo(pr0.x,pr0.y);
  ctx.closePath();ctx.fill();
}

function drawFoamOnTile(col, row, t) {
  const steps = 18;
  ctx.save();
  clipTilePath(col, row);
  ctx.clip();
  for (let i = 0; i < steps; i++) {
    const tc = i / steps;
    const bCol = col + tc;
    const bRow = row + (1 - tc) * 0.3;
    const sp = iso(bCol, bRow, 0.05);
    const pulse = Math.sin(t*0.07 + col*1.1 + i*0.8) * 0.5 + 0.5;
    const r = 3 + pulse * 4;
    ctx.globalAlpha = 0.5 + pulse * 0.45;
    ctx.fillStyle = '#d8f2ff';
    ctx.beginPath(); ctx.arc(sp.x, sp.y, r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── WAVE SETTINGS ─────────────────────────────────────────────────
const waveRings = [];
let waveTimer  = 0;
let nextWaveIn = 60 + Math.random() * 80;

const SPAWN_ZONES = [
  [0.5, 2.5],[2,4.5],[4,7],[6,9.5],[9,11.5],[0.5,11.5],
];

function spawnWave() {
  const zone = SPAWN_ZONES[Math.floor(Math.random() * SPAWN_ZONES.length)];
  const col  = zone[0] + Math.random() * (zone[1] - zone[0]);
  const row  = shoreD - col + 0.5 + Math.random() * 2.5;
  waveRings.push({
    col, row,
    r:     0,
    alpha: 0.5 + Math.random() * 0.45,
    speed: 0.008 + Math.random() * 0.022,
    decay: 0.003 + Math.random() * 0.012,
  });
  nextWaveIn = 30 + Math.random() * 120;
}

function drawSky() {
  const g = ctx.createLinearGradient(0,0,0,SH*0.38);
  g.addColorStop(0,'#2e6898');
  g.addColorStop(1,'#70b0d0');
  ctx.fillStyle=g; ctx.fillRect(0,0,SW,SH);
  [[SW*.14,SH*.06,1],[SW*.50,SH*.03,.75],[SW*.80,SH*.09,.6]].forEach(([x,y,s])=>{
    ctx.save(); ctx.translate(x,y); ctx.scale(s,s); ctx.fillStyle='#daeef8';
    [[0,7,42,13],[10,-4,30,13],[22,-13,22,13],[38,4,18,12]].forEach(
      ([rx,ry,rw,rh])=>ctx.fillRect(rx,ry,rw,rh));
    ctx.restore();
  });
}

function drawCastle(t) {
  const BC = 3, BR = 3;

  for(let dc=0;dc<4;dc++) for(let dr=0;dr<4;dr++)
    isoBlock(BC+dc,BR+dr,0,0.4,'#dab84a','#b89030','#906810');

  for(let i=0;i<4;i++){
    isoBlock(BC+i, BR,   0.4,0.5,'#d0a840','#a88228','#806010');
    isoBlock(BC+i, BR+3, 0.4,0.5,'#d0a840','#a88228','#806010');
    isoBlock(BC,   BR+i, 0.4,0.5,'#d0a840','#a88228','#806010');
    isoBlock(BC+3, BR+i, 0.4,0.5,'#d0a840','#a88228','#806010');
  }

  [[BC,BR],[BC+3,BR],[BC,BR+3],[BC+3,BR+3]].forEach(([c,r])=>{
    isoBlock(c,r,0.4,0.5,'#dab848','#b89030','#906810');
    isoBlock(c,r,0.9,0.5,'#dab848','#b89030','#906810');
    isoBlock(c,r,1.4,0.5,'#dab848','#b89030','#906810');
    isoBlock(c+0.1, r+0.1, 1.9,0.35,'#e0c050','#c0a030','#907010');
    isoBlock(c+0.55,r+0.1, 1.9,0.35,'#e0c050','#c0a030','#907010');
    isoBlock(c+0.1, r+0.55,1.9,0.35,'#e0c050','#c0a030','#907010');
  });

  for(let i=1;i<3;i++){
    isoBlock(BC+i,BR,  0.9,0.35,'#dabb48','#b89030','#906810');
    isoBlock(BC+i,BR+3,0.9,0.35,'#dabb48','#b89030','#906810');
    isoBlock(BC,  BR+i,0.9,0.35,'#dabb48','#b89030','#906810');
    isoBlock(BC+3,BR+i,0.9,0.35,'#dabb48','#b89030','#906810');
  }

  isoBlock(BC+1,BR+1,0.4,0.5,'#e0c050','#c0a030','#907010');
  isoBlock(BC+2,BR+1,0.4,0.5,'#e0c050','#c0a030','#907010');
  isoBlock(BC+1,BR+2,0.4,0.5,'#e0c050','#c0a030','#907010');
  isoBlock(BC+2,BR+2,0.4,0.5,'#e0c050','#c0a030','#907010');
  isoBlock(BC+1,BR+1,0.9,0.5,'#e8c855','#c8a835','#987515');
  isoBlock(BC+2,BR+1,0.9,0.5,'#e8c855','#c8a835','#987515');
  isoBlock(BC+1,BR+2,0.9,0.5,'#e8c855','#c8a835','#987515');
  isoBlock(BC+2,BR+2,0.9,0.5,'#e8c855','#c8a835','#987515');
  isoBlock(BC+1,BR+1,1.4,0.6,'#f0d060','#d0b040','#a08020');
  isoBlock(BC+2,BR+2,1.4,0.6,'#f0d060','#d0b040','#a08020');

  const gp = iso(BC+1.5, BR, 0.4);
  ctx.fillStyle='#1a1000';
  ctx.beginPath();ctx.ellipse(gp.x-2,gp.y+2,8,13,0,Math.PI,0);ctx.fill();
  ctx.fillRect(gp.x-10,gp.y+2,16,10);

  drawIsoFlag(BC,   BR,   1.95,'#cc2020',t);
  drawIsoFlag(BC+3, BR,   1.95,'#d4a010',t);
  drawIsoFlag(BC,   BR+3, 1.95,'#cc2020',t);
  drawIsoFlag(BC+3, BR+3, 1.95,'#d4a010',t);
  drawIsoFlag(BC+1.5,BR+1.5,2.15,'#cc2020',t);
}

function drawIsoFlag(col, row, z, color, t) {
  const base = iso(col+0.5, row+0.5, z);
  const top  = {x:base.x, y:base.y-28};
  ctx.strokeStyle='#7a6030'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(base.x,base.y); ctx.lineTo(top.x,top.y); ctx.stroke();
  const wave = Math.sin(t*0.09)*5;
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(top.x,top.y);
  ctx.lineTo(top.x+14+wave,top.y+5);
  ctx.lineTo(top.x+12+wave*.5,top.y+11);
  ctx.lineTo(top.x,top.y+8);
  ctx.closePath(); ctx.fill();
}

function drawMoat(t) {
  const BC=3,BR=3;
  const moatTiles = [
    [BC-1,BR],[BC,BR-1],[BC+1,BR-1],[BC+2,BR-1],[BC+3,BR-1],[BC+4,BR],
    [BC+4,BR+1],[BC+4,BR+2],[BC+4,BR+3],[BC+4,BR+4],
    [BC+3,BR+4],[BC+2,BR+4],[BC+1,BR+4],[BC,BR+4],
    [BC-1,BR+3],[BC-1,BR+2],[BC-1,BR+1],
  ];
  moatTiles.forEach(([c,r])=>{
    ctx.save();
    clipTilePath(c,r); ctx.clip();
    ctx.drawImage(wCanvas,0,0);
    ctx.restore();
    const pulse = Math.sin(t*0.06+c*0.7+r*0.5)*0.5+0.5;
    drawTileTop(c,r,`rgba(200,240,255,${0.15+pulse*0.15})`);
  });
}

// ── Tool Chest ────────────────────────────────────────────────────
// A wooden chest sitting on the beach near the castle.
// CC/CR = chest col/row — placed to the right of the castle footprint.
// ← TWEAK: move chest by changing CC/CR
const CC = 8, CR = 7; // chest anchor tile (beach, clear of castle & moat)

function drawToolChest(t) {
  // ── Base / bottom of chest (dark wood) ───────────────────────
  isoBlock(CC, CR, 0, 0.28,
    '#7a4a18',  // top
    '#5a3208',  // left face
    '#4a2808'); // right face

  // ── Lid (slightly wider feel via overhang color) ──────────────
  isoBlock(CC, CR, 0.28, 0.14,
    '#9a6228',  // top — lighter, like worn lid
    '#6a3e10',  // left
    '#5a3008'); // right

  // ── Lid front lip (tiny ridge) ────────────────────────────────
  isoBlock(CC, CR, 0.38, 0.04,
    '#b07830',
    '#7a5018',
    '#6a4010');

  // ── Metal bands — drawn as thin dark strips across the lid ────
  const band = (frac) => {
    const c0 = iso(CC + frac,       CR,       0.42);
    const c1 = iso(CC + frac,       CR + 1,   0.42);
    const c2 = iso(CC + frac + 0.06,CR + 1,   0.42);
    const c3 = iso(CC + frac + 0.06,CR,       0.42);
    ctx.fillStyle = '#2a1a08';
    ctx.beginPath();
    ctx.moveTo(c0.x,c0.y); ctx.lineTo(c1.x,c1.y);
    ctx.lineTo(c2.x,c2.y); ctx.lineTo(c3.x,c3.y);
    ctx.closePath(); ctx.fill();
  };
  band(0.2);
  band(0.72);

  // ── Hasp / clasp in center of lid front ───────────────────────
  const hasp = iso(CC + 0.5, CR, 0.36);
  ctx.fillStyle = '#c8a030'; // brass
  ctx.fillRect(hasp.x - 4, hasp.y - 3, 8, 5);
  ctx.fillStyle = '#2a1a08';
  ctx.fillRect(hasp.x - 2, hasp.y - 1, 4, 3);

  // ── Subtle glow pulse — reads as interactive ──────────────────
  const pulse = Math.sin(t * 0.06) * 0.5 + 0.5;
  const glowPt = iso(CC + 0.5, CR + 0.5, 0.5);
  ctx.save();
  ctx.globalAlpha = 0.12 + pulse * 0.10;
  ctx.fillStyle = '#f0d060';
  ctx.beginPath();
  ctx.ellipse(glowPt.x, glowPt.y + 6, 18, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // ── Tool handles peeking out of chest ────────────────────────
  const toolBase = iso(CC + 0.5, CR + 0.4, 0.44);

  // Shovel handle
  ctx.strokeStyle = '#8a5820'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(toolBase.x - 6, toolBase.y + 2);
  ctx.lineTo(toolBase.x - 4, toolBase.y - 14);
  ctx.stroke();
  // Shovel head
  ctx.fillStyle = '#7a8890';
  ctx.beginPath();
  ctx.ellipse(toolBase.x - 4, toolBase.y - 14, 4, 3, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // Mallet handle
  ctx.strokeStyle = '#9a6428'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(toolBase.x + 5, toolBase.y + 2);
  ctx.lineTo(toolBase.x + 4, toolBase.y - 11);
  ctx.stroke();
  // Mallet head
  ctx.fillStyle = '#c8a060';
  ctx.fillRect(toolBase.x, toolBase.y - 16, 9, 5);
}

// ═══════════════════════════════════════════════════════════════════
// ── TOOLBOX SYSTEM ────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
//
// PIECE DEFINITIONS — add new pieces here.
// Each piece has:
//   id:      unique string key
//   label:   display name in the panel (keep short, ~2 lines max)
//   draw:    function(ctx, cx, cy, tw, th) draws a mini iso preview
//            cx/cy = center of the preview canvas, tw/th = tile pixel size
//
// ── Mini-iso helper (local to preview canvases) ───────────────────
function miniIso(cx, cy, tw, th, col, row, z) {
  return {
    x: cx + (col - row) * (tw / 2),
    y: cy + (col + row) * (th / 2) - (z||0) * th
  };
}

function miniBlock(ctx, cx, cy, tw, th, col, row, z, h, topC, leftC, rightC) {
  const p   = miniIso(cx,cy,tw,th, col,   row,   z+h);
  const pr  = miniIso(cx,cy,tw,th, col+1, row,   z+h);
  const pf  = miniIso(cx,cy,tw,th, col,   row+1, z+h);
  const pb  = miniIso(cx,cy,tw,th, col+1, row+1, z+h);
  const p0  = miniIso(cx,cy,tw,th, col,   row,   z);
  const pr0 = miniIso(cx,cy,tw,th, col+1, row,   z);
  const pf0 = miniIso(cx,cy,tw,th, col,   row+1, z);
  const pb0 = miniIso(cx,cy,tw,th, col+1, row+1, z);

  ctx.fillStyle=topC; ctx.beginPath();
  ctx.moveTo(p.x,p.y);ctx.lineTo(pr.x,pr.y);ctx.lineTo(pb.x,pb.y);ctx.lineTo(pf.x,pf.y);
  ctx.closePath();ctx.fill();
  ctx.fillStyle=leftC; ctx.beginPath();
  ctx.moveTo(pf.x,pf.y);ctx.lineTo(pb.x,pb.y);ctx.lineTo(pb0.x,pb0.y);ctx.lineTo(pf0.x,pf0.y);
  ctx.closePath();ctx.fill();
  ctx.fillStyle=rightC; ctx.beginPath();
  ctx.moveTo(pr.x,pr.y);ctx.lineTo(pb.x,pb.y);ctx.lineTo(pb0.x,pb0.y);ctx.lineTo(pr0.x,pr0.y);
  ctx.closePath();ctx.fill();
}

// Mini water fill for moat previews
function miniMoatTile(ctx, cx, cy, tw, th, col, row) {
  const p  = miniIso(cx,cy,tw,th, col,   row,   0);
  const pr = miniIso(cx,cy,tw,th, col+1, row,   0);
  const pb = miniIso(cx,cy,tw,th, col+1, row+1, 0);
  const pf = miniIso(cx,cy,tw,th, col,   row+1, 0);
  const g = ctx.createLinearGradient(p.x, p.y, pb.x, pb.y);
  g.addColorStop(0,'#2a6090'); g.addColorStop(1,'#1a4060');
  ctx.fillStyle=g; ctx.beginPath();
  ctx.moveTo(p.x,p.y);ctx.lineTo(pr.x,pr.y);ctx.lineTo(pb.x,pb.y);ctx.lineTo(pf.x,pf.y);
  ctx.closePath();ctx.fill();
}

// Mini drawbridge planks in iso
function miniDrawbridge(ctx, cx, cy, tw, th) {
  // Sand base
  miniBlock(ctx,cx,cy,tw,th, -0.5,0, 0,0.1,'#dab84a','#b89030','#906810');
  miniBlock(ctx,cx,cy,tw,th,  0.5,0, 0,0.1,'#dab84a','#b89030','#906810');
  // Bridge planks spanning the gap
  const planks = 4;
  for(let i=0;i<planks;i++){
    const t = i/planks;
    const c = -0.5 + t*1;
    miniBlock(ctx,cx,cy,tw,th, c,0.05, 0.1,0.12,'#9a6828','#7a4a18','#5a3008');
  }
  // Chain ropes
  const p1 = miniIso(cx,cy,tw,th, -0.5,0.5, 0.25);
  const p2 = miniIso(cx,cy,tw,th,  0.5,0.5, 0.25);
  const pm = miniIso(cx,cy,tw,th,  0,  0.5, 0.08);
  ctx.strokeStyle='#666'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.quadraticCurveTo(pm.x,pm.y,p2.x,p2.y); ctx.stroke();
}

// ── BUILD TOOLBOX DOM ─────────────────────────────────────────────
// Renders each piece into its own small canvas for the preview,
// then wires up click → select, plus Escape to deselect.
let selectedPiece = null; // null = nothing selected; string id = active piece

const toolboxEl = document.getElementById('toolbox');

PIECES.forEach(piece => {
  const btn = document.createElement('div');
  btn.className = 'tool-btn';
  btn.dataset.id = piece.id;

  // Mini preview canvas
  const pc = document.createElement('canvas');
  pc.width  = 64;
  pc.height = 38;
  const pctx = pc.getContext('2d');

  // Draw piece preview centered in its canvas
  pctx.clearRect(0,0,64,38);
  piece.draw(pctx, 32, 22);

  // Label (supports \n for two-line labels)
  const label = document.createElement('div');
  label.className = 'tool-label';
  label.textContent = piece.label.replace('\n',' ');

  btn.appendChild(pc);
  btn.appendChild(label);
  toolboxEl.appendChild(btn);

  // ── Click to select (fallback for mouse users) ───────────────
  btn.addEventListener('click', () => {
    if (selectedPiece === piece.id) {
      selectedPiece = null;
      btn.classList.remove('selected');
    } else {
      document.querySelectorAll('.tool-btn.selected').forEach(b=>b.classList.remove('selected'));
      selectedPiece = piece.id;
      btn.classList.add('selected');
    }
  });

  // ── Touch: tap to select; drag sets isDragging via touchmove ───
  btn.addEventListener('touchstart', e => {
    e.preventDefault(); // stop scroll
    document.querySelectorAll('.tool-btn.selected,.counter-btn.selected').forEach(b=>b.classList.remove('selected'));
    selectedPiece = piece.id;
    selectedCounter = null;
    btn.classList.add('selected');
    // isDragging NOT set here — touchmove sets it so tap-to-select works cleanly
  }, { passive: false });

  // ── Mouse: mousedown on button starts drag ────────────────────
  btn.addEventListener('mousedown', e => {
    document.querySelectorAll('.tool-btn.selected').forEach(b=>b.classList.remove('selected'));
    selectedPiece = piece.id;
    btn.classList.add('selected');
    isDragging = true;
  });
});

// Escape to cancel selection / drag
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    selectedPiece = null;
    selectedCounter = null;
    isDragging = false;
    document.querySelectorAll('.tool-btn.selected,.counter-btn.selected').forEach(b=>b.classList.remove('selected'));
  }
});

// ── LIGHTNING STRIKE ─────────────────────────────────────────────
function activateLightning(sx, sy) {
  // Find the closest active bird to the tap point
  let best = null, bestDist = 120; // generous tap radius for birds (they move)
  for (const e of enemies) {
    if (e.type !== 'bird' || e.state !== 'active') continue;
    const sp = iso(e.col, e.row, e.altitude || 0);
    const d  = Math.sqrt((sp.x - sx) ** 2 + (sp.y - sy) ** 2);
    if (d < bestDist) { bestDist = d; best = e; }
  }
  if (!best) return;
  const sp = iso(best.col, best.row, best.altitude || 0);
  lightningStrikes.push({ x: sp.x, y: sp.y, timer: 22, maxTimer: 22 });
  best.hp = 0;
  best.state = 'scared';
  best.scaredTimer = 0;
}

function drawLightningStrikes() {
  for (let i = lightningStrikes.length - 1; i >= 0; i--) {
    const s = lightningStrikes[i];
    const alpha = s.timer / s.maxTimer;
    ctx.save();
    ctx.globalAlpha = alpha;
    const x = s.x, y = s.y;
    // Outer glow bolt
    ctx.strokeStyle = '#88aaff';
    ctx.lineWidth = 5;
    ctx.shadowColor = '#aaccff';
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.moveTo(x + 3,  y - 36);
    ctx.lineTo(x + 9,  y - 22);
    ctx.lineTo(x,      y - 16);
    ctx.lineTo(x + 5,  y);
    ctx.stroke();
    // Bright yellow core
    ctx.strokeStyle = '#ffee44';
    ctx.lineWidth = 2.5;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(x + 3,  y - 36);
    ctx.lineTo(x + 9,  y - 22);
    ctx.lineTo(x,      y - 16);
    ctx.lineTo(x + 5,  y);
    ctx.stroke();
    // White hot center
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(x + 3,  y - 36);
    ctx.lineTo(x + 9,  y - 22);
    ctx.lineTo(x,      y - 16);
    ctx.lineTo(x + 5,  y);
    ctx.stroke();
    ctx.restore();
    s.timer--;
    if (s.timer <= 0) lightningStrikes.splice(i, 1);
  }
}

// ── HOLE (crab trap) ──────────────────────────────────────────────
function activateHole(sx, sy) {
  if (holes.length >= HOLE_MAX) return;
  const g = screenToGrid(sx, sy);
  if (isTileWater(g.col, g.row)) return;
  if (holes.some(h => h.col === g.col && h.row === g.row)) return;
  holes.push({ col: g.col, row: g.row, uses: 2 });
}

function drawHoles() {
  for (const h of holes) {
    const sp = iso(h.col + 0.5, h.row + 0.5, 0.02);
    ctx.save();
    ctx.translate(sp.x, sp.y);
    ctx.fillStyle = '#c9a06a';
    ctx.beginPath(); ctx.ellipse(0, 0, 15, 8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#241708';
    ctx.shadowColor = '#000000';
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.ellipse(0, 0, 11, 5.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    for (let p = 0; p < h.uses; p++) {
      ctx.fillStyle = '#ffe08a';
      ctx.beginPath(); ctx.arc(-6 + p * 6, 12, 1.6, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

// ── CLEANER TRUCK (coin income) ───────────────────────────────────
function activateCleaner(sx, sy) {
  if (truck || truckCooldown > 0) return;
  const g = screenToGrid(sx, sy);
  const midRow = Math.floor(GROWS / 2);
  if (g.col < GCOLS / 2) {
    truck = { col: -1, row: midRow, dirC: 1 };
  } else {
    truck = { col: GCOLS, row: midRow, dirC: -1 };
  }
}

function tickTruck() {
  if (truckCooldown > 0) truckCooldown--;
  if (!truck) return;
  truck.col += truck.dirC * 0.02;
  for (let i = poopSplats.length - 1; i >= 0; i--) {
    const p = poopSplats[i];
    const pDist = Math.sqrt((p.col - truck.col) ** 2 + (p.row - truck.row) ** 2);
    if (pDist < 1) {
      poopSplats.splice(i, 1);
      coins += 2;
    }
  }
  if (tick % 60 === 0) coins++;
  if (truck.col < -2 || truck.col > GCOLS + 2) {
    truck = null;
    truckCooldown = 900;
  }
}

function drawTruck() {
  if (!truck) return;
  const sp = iso(truck.col, truck.row, 0.02);
  const flip = truck.dirC < 0 ? -1 : 1;
  ctx.save();
  ctx.translate(sp.x, sp.y);
  ctx.scale(flip, 1);
  ctx.shadowColor = '#88aaff';
  ctx.shadowBlur = 6;
  ctx.fillStyle = '#3fa9e0';
  ctx.beginPath();
  ctx.moveTo(-18, 8); ctx.lineTo(-18, -2); ctx.lineTo(-8, -10);
  ctx.lineTo(2, -10); ctx.lineTo(2, 8); ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = '#f2c94c';
  ctx.fillRect(2, -2, 14, 10);
  ctx.strokeRect(2, -2, 14, 10);
  ctx.strokeStyle = '#e0522d';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-20, 8); ctx.quadraticCurveTo(-24, 2, -20, -4);
  ctx.stroke();
  ctx.fillStyle = '#222222';
  ctx.beginPath(); ctx.arc(-12, 10, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(10, 10, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// ── DRAG STATE & GHOST ────────────────────────────────────────────
// isDragging = true while finger/mouse is held down after picking a piece.
// ghostCol/ghostRow = current grid tile under cursor.
// dragFloatX/Y = raw screen position for the floating piece icon while dragging.
let isDragging  = false;
let ghostCol    = -1, ghostRow = -1;
let dragFloatX  = -1, dragFloatY = -1;

// Convert screen px → iso grid col/row
function screenToGrid(sx, sy) {
  const dx = sx - OX, dy = sy - OY;
  return {
    col: Math.round((dx/(TW()/2) + dy/(TH()/2)) / 2),
    row: Math.round((dy/(TH()/2) - dx/(TW()/2)) / 2),
  };
}

// ── MOUSE drag tracking ───────────────────────────────────────────
window.addEventListener('mousemove', e => {
  if (!selectedPiece) return;
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  dragFloatX = sx; dragFloatY = sy;
  const g = screenToGrid(sx, sy);
  ghostCol = g.col; ghostRow = g.row;
});

window.addEventListener('mouseup', e => {
  if (!isDragging || !selectedPiece) { isDragging = false; return; }
  isDragging = false;
  placePiece(ghostCol, ghostRow);
});

// ── TOUCH drag tracking ───────────────────────────────────────────
window.addEventListener('touchmove', e => {
  if (!selectedPiece) return;
  e.preventDefault();
  isDragging = true; // actual drag detected — touchend will place on release
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const sx = touch.clientX - rect.left;
  const sy = touch.clientY - rect.top;
  dragFloatX = sx; dragFloatY = sy;
  const g = screenToGrid(sx, sy);
  ghostCol = g.col; ghostRow = g.row;
}, { passive: false });

window.addEventListener('touchend', e => {
  isDragging = false;
  if (!selectedPiece) return;
  const touch = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const sx = touch.clientX - rect.left;
  const sy = touch.clientY - rect.top;
  // Only place if finger lifted over the canvas area (not the toolbox panels)
  if (sx >= 0 && sy >= 0 && sx <= canvas.width && sy <= canvas.height) {
    placePiece(screenToGrid(sx, sy).col, screenToGrid(sx, sy).row);
  }
});

// ── PLACED PIECES ─────────────────────────────────────────────────
// Each entry: { id, col, row, health }
// health: 0–100. Decays each frame at a rate set by DECAY_RATE.
// ← clear all: placedPieces.length = 0
const placedPieces = [];

// ── DECAY RATES — ticks to lose 1 health point ────────────────────
// Lower number = faster decay. TWEAK these to balance gameplay.
// At 60fps: rate 60 = loses 1hp/sec, rate 600 = loses 1hp/10sec
const DECAY_RATE = {
  'wall-small':    72,   // ← fastest (~1 min to crumble at 60fps, was 1.5 min)
  'wall-medium':   162,  // ← medium  (~4.5 min, was 5 min)
  'wall-tall':     282,  // ← slow    (~7.8 min, was 8.3 min)
  'moat-shallow':  222,  // (~6.2 min, was 6.7 min)
  'moat-standard': 402,  // (~11.2 min, was 11.7 min)
  'moat-deep':     582,  // ← slowest (~16.2 min, was 16.7 min)
  'drawbridge':    132,  // (~3.7 min, was 4.2 min)
};

// Health thresholds for visual states
// 100–66: full, 65–33: worn (desaturated), 32–10: damaged (cracked tint), <10: crumbling
function healthState(h) {
  if (h > 66) return 'full';
  if (h > 33) return 'worn';
  if (h > 10) return 'damaged';
  return 'crumbling';
}

function placePiece(col, row) {
  if (col < 0 || row < 0 || col >= GCOLS || row >= GROWS) return;

  // Eraser: remove any piece at this tile — no water check, erase anywhere
  if (selectedPiece === 'eraser') {
    const idx = placedPieces.findIndex(p => p.col === col && p.row === row);
    if (idx !== -1) placedPieces.splice(idx, 1);
    return;
  }

  if (isTileWater(col, row)) return; // building blocked on water

  const exists = placedPieces.find(p => p.col === col && p.row === row);
  if (exists) {
    exists.id = selectedPiece;
    exists.health = 100;
    exists.decayTimer = 0;
  } else {
    placedPieces.push({ id: selectedPiece, col, row, health: 100, decayTimer: 0 });
  }
  // Release selection after placing
  selectedPiece = null;
  isDragging = false;
  document.querySelectorAll('.tool-btn.selected').forEach(b => b.classList.remove('selected'));
}

// ── DETERIORATION TICK — called once per render frame ─────────────
function tickDeterioration() {
  for (let i = placedPieces.length - 1; i >= 0; i--) {
    const p = placedPieces[i];
    const rate = DECAY_RATE[p.id] || 200;
    p.decayTimer = (p.decayTimer || 0) + 1;
    if (p.decayTimer >= rate) {
      p.decayTimer = 0;
      p.health = Math.max(0, p.health - 1);
    }
    // Remove piece when fully crumbled
    if (p.health <= 0) placedPieces.splice(i, 1);
  }
}

// Also allow tap-to-place on canvas (for non-drag clicks after selecting)
canvas.addEventListener('click', e => {
  if (!selectedPiece || isDragging) return;
  const rect = canvas.getBoundingClientRect();
  const g = screenToGrid(e.clientX - rect.left, e.clientY - rect.top);
  placePiece(g.col, g.row);
});

// ── Draw all placed pieces ────────────────────────────────────────
function drawPlacedPieces() {
  // Sort by rotated diagonal so depth order stays correct at any camera angle
  const sorted = [...placedPieces].sort((a,b) => {
    const ra = rotateGrid(a.col, a.row);
    const rb = rotateGrid(b.col, b.row);
    return (ra.col + ra.row) - (rb.col + rb.row);
  });
  sorted.forEach(p => {
    const state = healthState(p.health);
    ctx.save();

    if (state === 'worn') {
      ctx.globalAlpha = 0.88;
    } else if (state === 'damaged') {
      ctx.globalAlpha = 0.78;
    } else if (state === 'crumbling') {
      ctx.globalAlpha = 0.4 + Math.sin(tick * 0.18) * 0.25;
    }

    drawPlacedPiece(p.id, p.col, p.row, state);

    // Damage overlay tint
    if (state === 'damaged' || state === 'crumbling') {
      const pt  = iso(p.col,   p.row,   0);
      const ptr = iso(p.col+1, p.row,   0);
      const ptb = iso(p.col+1, p.row+1, 0);
      const ptf = iso(p.col,   p.row+1, 0);
      ctx.globalAlpha = state === 'crumbling' ? 0.45 : 0.22;
      ctx.fillStyle = '#c04010';
      ctx.beginPath();
      ctx.moveTo(pt.x,pt.y); ctx.lineTo(ptr.x,ptr.y);
      ctx.lineTo(ptb.x,ptb.y); ctx.lineTo(ptf.x,ptf.y);
      ctx.closePath(); ctx.fill();
    }

    ctx.restore();

    // ── Hover health meter — shown when ghost tile matches this piece ──
    const isHovered = (ghostCol === p.col && ghostRow === p.row);
    if (isHovered) drawHealthMeter(p);
  });
}

// ── HEALTH METER — detailed panel shown on hover ──────────────────
// Appears above the hovered piece as a small card with:
//   - piece name
//   - segmented health bar (10 segments)
//   - numeric health value
//   - status label (Full / Worn / Damaged / Crumbling)
function drawHealthMeter(p) {
  const state  = healthState(p.health);
  const anchor = iso(p.col + 0.5, p.row + 0.5, 1.6); // float above piece

  const pw = 90, ph = 44;
  let px = anchor.x - pw / 2;
  let py = anchor.y - ph - 8;

  // Keep panel on screen
  px = Math.max(4, Math.min(SW - pw - 4, px));
  py = Math.max(4, Math.min(SH - ph - 4, py));

  ctx.save();

  // Panel background
  ctx.globalAlpha = 0.92;
  ctx.fillStyle = 'rgba(6,12,22,0.88)';
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 5); ctx.fill();

  // Border color by state
  const borderColor = state==='full'?'#40b060' : state==='worn'?'#c0a020' : state==='damaged'?'#d05020' : '#e02020';
  ctx.strokeStyle = borderColor; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 5); ctx.stroke();

  ctx.globalAlpha = 1;

  // Piece name
  const PIECE_LABELS = {
    'wall-small':'Small Wall','wall-medium':'Medium Wall','wall-tall':'Tall Wall',
    'moat-shallow':'Shallow Moat','moat-standard':'Moat','moat-deep':'Deep Moat',
    'drawbridge':'Drawbridge',
  };
  ctx.fillStyle = '#b8d8e8';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText((PIECE_LABELS[p.id] || p.id).toUpperCase(), px + pw/2, py + 10);

  // Segmented health bar — 10 segments
  const segs = 10;
  const segW = (pw - 12) / segs;
  const segH = 7;
  const barX = px + 6;
  const barY = py + 15;
  const filledSegs = Math.ceil((p.health / 100) * segs);

  for (let i = 0; i < segs; i++) {
    const sx = barX + i * (segW + 1);
    const filled = i < filledSegs;
    // Color gradient: green → yellow → orange → red
    let segColor;
    if (!filled) {
      segColor = 'rgba(255,255,255,0.08)';
    } else {
      const ratio = i / segs;
      if (ratio > 0.6) segColor = '#40c060';       // green
      else if (ratio > 0.35) segColor = '#d0b020';  // yellow
      else if (ratio > 0.15) segColor = '#d06020';  // orange
      else segColor = '#e02020';                      // red
    }
    ctx.fillStyle = segColor;
    ctx.fillRect(sx, barY, segW, segH);
  }

  // Numeric HP
  ctx.fillStyle = '#c8e8ff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`HP: ${p.health}`, px + 6, py + 34);

  // Status label
  const stateColor = state==='full'?'#40c060' : state==='worn'?'#d0b020' : state==='damaged'?'#d06020' : '#e02020';
  const stateLabel = state.charAt(0).toUpperCase() + state.slice(1);
  ctx.fillStyle = stateColor;
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(stateLabel, px + pw - 6, py + 34);

  ctx.restore();
}

function drawPlacedPiece(id, col, row, state) {
  switch(id) {
    case 'wall-small':
      isoBlock(col,row, 0,0.1,'#dab84a','#b89030','#906810');
      isoBlock(col,row, 0.1,0.5,'#d0a840','#a88228','#806010');
      break;
    case 'wall-medium':
      isoBlock(col,row, 0,0.1,'#dab84a','#b89030','#906810');
      isoBlock(col,row, 0.1,0.5,'#d0a840','#a88228','#806010');
      isoBlock(col,row, 0.6,0.5,'#d0a840','#a88228','#806010');
      isoBlock(col+0.05,row+0.05, 1.1,0.28,'#dabb48','#b89030','#906810');
      isoBlock(col+0.55,row+0.05, 1.1,0.28,'#dabb48','#b89030','#906810');
      break;
    case 'wall-tall':
      isoBlock(col,row, 0,0.1,'#dab84a','#b89030','#906810');
      isoBlock(col,row, 0.1,0.5,'#d0a840','#a88228','#806010');
      isoBlock(col,row, 0.6,0.5,'#d0a840','#a88228','#806010');
      isoBlock(col,row, 1.1,0.5,'#d0a840','#a88228','#806010');
      isoBlock(col+0.05,row+0.05, 1.6,0.3,'#e0c050','#c0a030','#907010');
      isoBlock(col+0.55,row+0.05, 1.6,0.3,'#e0c050','#c0a030','#907010');
      isoBlock(col+0.05,row+0.55, 1.6,0.3,'#e0c050','#c0a030','#907010');
      break;
    case 'moat-shallow':
    case 'moat-standard':
    case 'moat-deep': {
      const p  = iso(col,   row,   0);
      const pr = iso(col+1, row,   0);
      const pb = iso(col+1, row+1, 0);
      const pf = iso(col,   row+1, 0);
      const colors = {
        'moat-shallow': ['#3a7aaa','#2a5a80'],
        'moat-standard': ['#2a6090','#1a4060'],
        'moat-deep':    ['#193a58','#0a1e30'],
      };
      const [c1,c2] = colors[id];
      const g = ctx.createLinearGradient(p.x,p.y,pb.x,pb.y);
      g.addColorStop(0,c1); g.addColorStop(1,c2);
      ctx.fillStyle=g; ctx.beginPath();
      ctx.moveTo(p.x,p.y);ctx.lineTo(pr.x,pr.y);ctx.lineTo(pb.x,pb.y);ctx.lineTo(pf.x,pf.y);
      ctx.closePath();ctx.fill();
      // Shimmer line
      ctx.strokeStyle='rgba(140,210,255,0.35)'; ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(p.x,p.y);ctx.lineTo(pr.x,pr.y);ctx.lineTo(pb.x,pb.y);ctx.lineTo(pf.x,pf.y);
      ctx.closePath();ctx.stroke();
      break;
    }
    case 'drawbridge': {
      const dbPlanks = 4;
      for(let i=0;i<dbPlanks;i++){
        const tf = i/dbPlanks;
        isoBlock(col+tf,row+0.1, 0.05,0.12,'#9a6828','#7a4a18','#5a3008');
      }
      const db1 = iso(col,     row+0.5, 0.25);
      const db2 = iso(col+1,   row+0.5, 0.25);
      const dbm = iso(col+0.5, row+0.5, 0.08);
      ctx.strokeStyle='#555'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(db1.x,db1.y); ctx.quadraticCurveTo(dbm.x,dbm.y,db2.x,db2.y); ctx.stroke();
      break;
    }
  }
}


// Called at the end of each render frame, after everything else.
function drawGhost(t) {
  if (!selectedPiece) return;
  const piece = PIECES.find(p => p.id === selectedPiece);
  if (!piece) return;

  // ── Grid tile highlight + iso ghost ───────────────────────────
  if (ghostCol >= 0 && ghostRow >= 0 && ghostCol < GCOLS && ghostRow < GROWS) {
    const onWater = isTileWater(ghostCol, ghostRow);
    ctx.save();
    ctx.globalAlpha = 0.55 + Math.sin(t * 0.08) * 0.12;

    const p  = iso(ghostCol,   ghostRow,   0);
    const pr = iso(ghostCol+1, ghostRow,   0);
    const pb = iso(ghostCol+1, ghostRow+1, 0);
    const pf = iso(ghostCol,   ghostRow+1, 0);

    // Teal = valid placement, red = water (invalid for building)
    // Eraser ignores water state — can erase any placed piece anywhere
    const eraserHasPiece = selectedPiece === 'eraser' &&
      placedPieces.find(p => p.col === ghostCol && p.row === ghostRow);

    ctx.fillStyle = (onWater && selectedPiece !== 'eraser') ? 'rgba(220,60,60,0.22)' :
                    eraserHasPiece ? 'rgba(255,40,60,0.25)' : 'rgba(100,220,200,0.18)';
    ctx.beginPath();
    ctx.moveTo(p.x,p.y); ctx.lineTo(pr.x,pr.y); ctx.lineTo(pb.x,pb.y); ctx.lineTo(pf.x,pf.y);
    ctx.closePath(); ctx.fill();

    ctx.strokeStyle = (onWater && selectedPiece !== 'eraser') ? '#e06868' :
                      eraserHasPiece ? '#ff4060' : '#7ae8d8';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(p.x,p.y); ctx.lineTo(pr.x,pr.y); ctx.lineTo(pb.x,pb.y); ctx.lineTo(pf.x,pf.y);
    ctx.closePath(); ctx.stroke();

    if (selectedPiece === 'eraser') {
      // Eraser: show red X on any tile that has a piece, water or not
      if (eraserHasPiece) {
        const ex1 = iso(ghostCol+0.15, ghostRow+0.15, 0.05);
        const ex2 = iso(ghostCol+0.85, ghostRow+0.85, 0.05);
        const ex3 = iso(ghostCol+0.85, ghostRow+0.15, 0.05);
        const ex4 = iso(ghostCol+0.15, ghostRow+0.85, 0.05);
        ctx.globalAlpha = 0.9;
        ctx.strokeStyle = '#ff4060'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(ex1.x,ex1.y); ctx.lineTo(ex2.x,ex2.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ex3.x,ex3.y); ctx.lineTo(ex4.x,ex4.y); ctx.stroke();
      }
    } else if (!onWater) {
      ctx.globalAlpha = 0.42 + Math.sin(t * 0.08) * 0.1;
      drawPieceGhost(selectedPiece, ghostCol, ghostRow);
    }
    ctx.restore();
  }

  // ── Floating badge follows finger / cursor while dragging ─────
  if (isDragging && dragFloatX >= 0 && dragFloatY >= 0) {
    const fw = 52, fh = 40;
    const fx = dragFloatX - fw / 2;
    const fy = dragFloatY - fh - 18; // float above finger

    ctx.save();
    ctx.globalAlpha = 0.88;

    // Badge background
    ctx.fillStyle = 'rgba(8,16,26,0.82)';
    ctx.beginPath();
    ctx.roundRect(fx, fy, fw, fh, 6);
    ctx.fill();
    ctx.strokeStyle = '#7ae8d8';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Mini piece preview inside badge
    ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.roundRect(fx, fy, fw, fh, 6); ctx.clip();
    piece.draw(ctx, fx + fw / 2, fy + fh * 0.6);
    ctx.restore();
  }
}

// The decorative castle has its own HP pool. Enemies damage it
// directly when no placed pieces are blocking their path.
// ← TWEAK: starting HP and damage rate
let castleHP        = 100; // current castle health (0 = game over)
const CASTLE_MAX_HP = 100;
const CASTLE_DAMAGE_RATE = 300; // ← ticks per 1 HP loss when enemy reaches castle

let gameOver = false;

// ── WAVE / SCORE STATE ──────────────────────────────────────────
// Score = waves survived (endless survival). waveNumber advances
// when the wave phase system (build/defend) completes a defend
// phase — see WAVE PHASE module (added v0.8.x). Until then it
// displays but does not advance.
let waveNumber = 1;   // current wave (1-based)
let score      = 0;   // waves survived

// ── WAVE PHASE STATE MACHINE ────────────────────────────────────
// 'build'  = rebuild break: no enemy spawns, pieces still decay.
//            Player taps START WAVE button to begin defending.
// 'defend' = wave active: enemies spawn until the wave's budget is
//            exhausted. Wave ends (clear-out) when budget is spent
//            AND all enemies are gone — then score++, next wave,
//            back to 'build'.
let wavePhase = 'build';
// ── WAVE DIFFICULTY SCALING (v0.8.1) ──────────────────────────
// All scaling derives from waveNumber — no new state to reset.
const WAVE_BUDGET_BASE   = 8;     // ← enemies on wave 1
const WAVE_BUDGET_GROWTH = 2;     // ← +N enemies per wave
const WAVE_RATE_SCALE    = 0.92;  // ← spawn intervals ×this per wave
const WAVE_RATE_FLOOR    = 0.35;  // ← intervals never below 35% of base
const WAVE_CAP_EVERY     = 3;     // ← +1 to crab/tourist/bird caps every N waves

function waveBudget()   { return WAVE_BUDGET_BASE + (waveNumber - 1) * WAVE_BUDGET_GROWTH; }
function waveRateMult() { return Math.max(WAVE_RATE_FLOOR, Math.pow(WAVE_RATE_SCALE, waveNumber - 1)); }
function waveCapBonus() { return Math.floor((waveNumber - 1) / WAVE_CAP_EVERY); }

let waveSpawnsRemaining = 0;

function startWave() {
  wavePhase = 'defend';
  waveSpawnsRemaining = waveBudget();
  // Reset spawn timers; pre-seed bird so one appears immediately on wave start
  crabSpawnTimer = 0; touristSpawnTimer = 0;
  birdSpawnTimer = ENEMY_BIRD_SPAWN_RATE; bobSpawnTimer = 0;
}

// START WAVE button hit-box (set each frame it is drawn)
let waveBtnX = 0, waveBtnY = 0, waveBtnW = 0, waveBtnH = 0;
function hitWaveButton(sx, sy) {
  return sx >= waveBtnX && sx <= waveBtnX + waveBtnW &&
         sy >= waveBtnY && sy <= waveBtnY + waveBtnH;
}

function drawWaveButton() {
  const bw = 150, bh = 34;
  const bx = SW/2 - bw/2, by = SH - 58;
  waveBtnX = bx; waveBtnY = by; waveBtnW = bw; waveBtnH = bh;
  ctx.save();
  const pulse = Math.sin(tick * 0.08) * 0.5 + 0.5;
  ctx.fillStyle = 'rgba(8,16,26,0.9)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(120,220,140,' + (0.5 + pulse * 0.5) + ')';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 8); ctx.stroke();
  ctx.fillStyle = '#a0e8b0';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('START WAVE ' + waveNumber, SW/2, by + 22);
  ctx.restore();
}

// Called by enemy tick when an enemy reaches the castle with no blocker
function damageCastle() {
  if (gameOver) return;
  castleHP = Math.max(0, castleHP - 1);
  if (castleHP <= 0) triggerGameOver();
}

function triggerGameOver() {
  gameOver = true;
}

// ── Castle HP HUD bar — drawn on canvas upper-left ────────────────
