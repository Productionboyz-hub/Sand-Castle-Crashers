//
// Each enemy is an object in the `enemies[]` array:
// {
//   type:     'crab' | 'tourist'
//   col, row: float grid position (moves each frame)
//   hp:       enemy health — tap to scare (reduces hp)
//   state:    'active' | 'scared' | 'dead'
//   ...type-specific fields
// }
//
// TUNING — all spawn rates and damage values here:
const ENEMY_CRAB_SPAWN_RATE    = 1800; // ← ticks between crab spawns (~30s at 60fps)
const ENEMY_TOURIST_SPAWN_RATE = 2400; // ← ticks between tourist spawns (~40s at 60fps)
const ENEMY_CRAB_MAX           = 3;    // ← max crabs on screen at once
const ENEMY_TOURIST_MAX        = 2;    // ← max tourists on screen at once
const ENEMY_CRAB_DAMAGE_RATE   = 180;  // ← ticks per 1 HP damage to a piece
const ENEMY_TOURIST_DAMAGE_RATE= 240;  // ← ticks per 1 HP damage to a piece
const ENEMY_SCARE_HP           = 3;    // ← taps needed to scare off an enemy
const ENEMY_SCARED_DURATION    = 90;   // ← frames enemy retreats before despawning
const ENEMY_CRAB_LAND_LIMIT    = 600;  // ← ticks a crab can survive on land before retreating (~10s)

const enemies = [];
let crabSpawnTimer    = 0;
let touristSpawnTimer = 0;

// ── CRAB SPAWNER ──────────────────────────────────────────────────
// Crabs emerge from the waterline and scuttle toward the castle.
// At high tide more crabs spawn (tide bonus).
function spawnCrab() {
  // Pick a spawn point along the current shoreline
  const col = 1 + Math.random() * (GCOLS - 2);
  const row = shoreD - col + Math.random() * 1.5;
  enemies.push({
    type:        'crab',
    col, row,
    targetCol:   ORBIT_PIVOT_C,  // head toward castle center
    targetRow:   ORBIT_PIVOT_R,
    hp:          ENEMY_SCARE_HP,
    state:       'active',
    damageTimer: 0,
    scaredTimer: 0,
    legPhase:    Math.random() * Math.PI * 2, // animation offset
    size:        0.55 + Math.random() * 0.3,  // slight size variation
    speed:       0.004 + Math.random() * 0.004,
  });
}

// ── TOURIST SPAWNER ───────────────────────────────────────────────
// Tourists spawn at the left or right edge of the beach and walk
// straight across, ignoring the castle until they bump into it.
function spawnTourist() {
  const fromLeft = Math.random() < 0.5;
  const col  = fromLeft ? 0.5 : GCOLS - 1.5;
  const row  = 3 + Math.random() * 6; // mid-beach rows
  const dirC = fromLeft ? 1 : -1;
  const dirR = (Math.random() - 0.5) * 0.4; // slight diagonal drift
  enemies.push({
    type:        'tourist',
    col, row,
    dirC, dirR,
    hp:          ENEMY_SCARE_HP,
    state:       'active',
    damageTimer: 0,
    scaredTimer: 0,
    walkPhase:   Math.random() * Math.PI * 2,
    phone:       Math.random() < 0.7, // 70% on phone (distracted)
    speed:       0.006 + Math.random() * 0.004,
  });
}

// ── ENEMY TICK ────────────────────────────────────────────────────
function tickEnemies() {
  const tideT = getTideT();
  const canSpawn = (wavePhase === 'defend' && waveSpawnsRemaining > 0);

  // Spawn birds — capped at ENEMY_BIRD_MAX
  const birdCount = enemies.filter(e => e.type === 'bird').length;
  birdSpawnTimer++;
  if (canSpawn && birdSpawnTimer >= ENEMY_BIRD_SPAWN_RATE * waveRateMult() && birdCount < ENEMY_BIRD_MAX + waveCapBonus()) {
    spawnBird(); waveSpawnsRemaining--; birdSpawnTimer = 0;
  }

  // Spawn Bob — only one at a time
  const bobCount = enemies.filter(e => e.type === 'bob').length;
  bobSpawnTimer++;
  if (canSpawn && bobSpawnTimer >= ENEMY_BOB_SPAWN_RATE * waveRateMult() && bobCount < ENEMY_BOB_MAX) {
    spawnBob(); waveSpawnsRemaining--; bobSpawnTimer = 0;
  }

  // Tick poop splats
  tickPoopSplats();
  tickTruck();
  const crabCount = enemies.filter(e => e.type === 'crab').length;
  const crabRate = Math.round(ENEMY_CRAB_SPAWN_RATE * (1 - tideT * 0.4) * waveRateMult());
  crabSpawnTimer++;
  if (canSpawn && crabSpawnTimer >= crabRate && crabCount < ENEMY_CRAB_MAX + waveCapBonus()) {
    spawnCrab(); waveSpawnsRemaining--; crabSpawnTimer = 0;
  }

  // Spawn tourists — randomly, capped at ENEMY_TOURIST_MAX
  const touristCount = enemies.filter(e => e.type === 'tourist').length;
  const touristRate = Math.round(ENEMY_TOURIST_SPAWN_RATE * (1 - tideT * 0.2) * waveRateMult());
  touristSpawnTimer++;
  if (canSpawn && touristSpawnTimer >= touristRate && touristCount < ENEMY_TOURIST_MAX + waveCapBonus()) {
    spawnTourist(); waveSpawnsRemaining--; touristSpawnTimer = 0;
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];

    // ── BIRD behaviour ────────────────────────────────────────────
    if (e.type === 'bird') { tickBird(e, i); continue; }

    // ── BOB behaviour ─────────────────────────────────────────────
    if (e.type === 'bob') { tickBob(e, i); continue; }
    if (e.state === 'scared') {
      e.scaredTimer++;
      // Retreat away from castle
      const dc = e.col - ORBIT_PIVOT_C;
      const dr = e.row - ORBIT_PIVOT_R;
      const dist = Math.sqrt(dc*dc + dr*dr) || 1;
      e.col += (dc/dist) * e.speed * 2.5;
      e.row += (dr/dist) * e.speed * 2.5;
      if (e.scaredTimer >= ENEMY_SCARED_DURATION ||
          e.col < -1 || e.col > GCOLS+1 || e.row < -1 || e.row > GROWS+1) {
        enemies.splice(i, 1);
      }
      continue;
    }

    // ── CRAB behaviour ────────────────────────────────────────────
    if (e.type === 'crab') {
      e.legPhase += 0.18;

      // ── Hole trap — crabs that stumble into an active hole are caught ──
      let caughtInHole = false;
      for (let hi = holes.length - 1; hi >= 0; hi--) {
        const h = holes[hi];
        const hDist = Math.sqrt((e.col - h.col) ** 2 + (e.row - h.row) ** 2);
        if (hDist < 0.6) {
          enemies.splice(i, 1);
          h.uses--;
          if (h.uses <= 0) holes.splice(hi, 1);
          caughtInHole = true;
          break;
        }
      }
      if (caughtInHole) continue;

      // ── Land timer — crabs dry out if away from water too long ──
      // ENEMY_CRAB_LAND_LIMIT ticks on land before they must retreat
      if (isTileWater(Math.round(e.col), Math.round(e.row))) {
        e.landTimer = Math.max(0, (e.landTimer||0) - 3); // recover fast in water
      } else {
        e.landTimer = (e.landTimer||0) + 1;
      }
      // When drying out: slow down and tint, then retreat to water
      if (e.landTimer >= ENEMY_CRAB_LAND_LIMIT) {
        e.state = 'scared'; // retreat to water
        e.scaredTimer = 0;
        continue;
      }

      // Move toward castle
      const dc = e.targetCol - e.col;
      const dr = e.targetRow - e.row;
      const dist = Math.sqrt(dc*dc + dr*dr) || 1;

      // Speed penalty as they dry out
      const dryRatio = (e.landTimer||0) / ENEMY_CRAB_LAND_LIMIT;
      const liveSpeed = e.speed * (1 - dryRatio * 0.6);

      const wobble = Math.sin(e.legPhase * 0.3) * 0.002;
      e.col += (dc/dist) * liveSpeed + wobble;
      e.row += (dr/dist) * liveSpeed - wobble;

      // Check if blocked by a moat piece
      const tileCol = Math.round(e.col);
      const tileRow = Math.round(e.row);
      const blocker = placedPieces.find(p =>
        p.col === tileCol && p.row === tileRow &&
        (p.id === 'moat-shallow' || p.id === 'moat-standard' || p.id === 'moat-deep')
      );
      if (blocker) {
        e.damageTimer++;
        if (e.damageTimer >= ENEMY_CRAB_DAMAGE_RATE) {
          blocker.health = Math.max(0, blocker.health - 1);
          e.damageTimer = 0;
        }
        e.col -= (dc/dist) * liveSpeed;
        e.row -= (dr/dist) * liveSpeed;
        continue;
      }

      // Attack nearest placed piece — or castle if none in range
      if (dist < 1.2) {
        e.damageTimer++;
        if (e.damageTimer >= ENEMY_CRAB_DAMAGE_RATE) {
          const target = nearestPiece(e.col, e.row, 1.5);
          if (target) {
            target.health = Math.max(0, target.health - 1);
          } else {
            damageCastle(); // no placed pieces — hit the castle directly
          }
          e.damageTimer = 0;
        }
      } else {
        e.damageTimer = Math.max(0, e.damageTimer - 1);
      }

      // Despawn if went into deep water (past shoreline by 2+ tiles)
      if (isTileWater(Math.round(e.col), Math.round(e.row)) &&
          e.col + e.row < shoreD - 2) {
        enemies.splice(i, 1);
      }
    }

    // ── TOURIST behaviour ─────────────────────────────────────────
    if (e.type === 'tourist') {
      e.walkPhase += 0.12;

      // ── Water avoidance — look ahead and steer away ───────────
      const lookC = e.col + e.dirC * e.speed * 5;
      const lookR = e.row + e.dirR * e.speed * 5;
      const waterAhead = isTileWater(Math.round(lookC), Math.round(lookR));

      if (waterAhead) {
        // Try flipping row direction to hug the shoreline
        const altR = e.row - e.dirR * e.speed * 5;
        if (!isTileWater(Math.round(lookC), Math.round(altR))) {
          e.dirR *= -1; // turn parallel to shore
        } else {
          // Both directions lead to water — reverse entirely
          e.dirC *= -1;
          e.dirR *= -1;
        }
        // Don't advance this frame
        continue;
      }

      // Also push back if already standing on water
      if (isTileWater(Math.round(e.col), Math.round(e.row))) {
        e.col -= e.dirC * e.speed * 2;
        e.row -= e.dirR * e.speed * 2;
        e.dirR *= -1;
        continue;
      }

      // Check for wall blockers ahead
      const nextCol = e.col + e.dirC * e.speed * 3;
      const nextRow = e.row + e.dirR * e.speed * 3;
      const wallAhead = placedPieces.find(p => {
        const dc = p.col - nextCol, dr = p.row - nextRow;
        return Math.sqrt(dc*dc+dr*dr) < 0.9 &&
          (p.id === 'wall-small' || p.id === 'wall-medium' || p.id === 'wall-tall');
      });

      if (wallAhead) {
        e.damageTimer++;
        if (e.damageTimer >= ENEMY_TOURIST_DAMAGE_RATE) {
          wallAhead.health = Math.max(0, wallAhead.health - 1);
          e.damageTimer = 0;
        }
        e.dirR *= -1; // try to navigate around
      } else {
        e.damageTimer = Math.max(0, e.damageTimer - 1);
        e.col += e.dirC * e.speed;
        e.row += e.dirR * e.speed;
      }

      // Chip nearest piece if very close to castle center, else hit castle
      const distToCenter = Math.sqrt(
        (e.col-ORBIT_PIVOT_C)**2 + (e.row-ORBIT_PIVOT_R)**2
      );
      if (distToCenter < 1.5) {
        e.damageTimer++;
        if (e.damageTimer >= ENEMY_TOURIST_DAMAGE_RATE) {
          const target = nearestPiece(e.col, e.row, 2);
          if (target) {
            target.health = Math.max(0, target.health - 1);
          } else {
            damageCastle(); // no buffer pieces — tourist bumbles into castle
          }
          e.damageTimer = 0;
        }
      }

      // Despawn if walked off grid
      if (e.col < -1 || e.col > GCOLS+1 || e.row < -1 || e.row > GROWS+1) {
        enemies.splice(i, 1);
      }
    }
  }

  // ── Wave clear-out check ─────────────────────────────────────
  // Budget spent and every enemy gone → wave survived.
  if (wavePhase === 'defend' && waveSpawnsRemaining <= 0 && enemies.length === 0) {
    score++;
    waveNumber++;
    wavePhase = 'build';
  }
}

// Find nearest placed piece within radius
function nearestPiece(col, row, radius) {
  let best = null, bestDist = radius;
  for (const p of placedPieces) {
    const d = Math.sqrt((p.col-col)**2 + (p.row-row)**2);
    if (d < bestDist) { bestDist = d; best = p; }
  }
  return best;
}

// ── TAP TO SCARE / COUNTERMEASURE DISPATCH ────────────────────────
canvas.addEventListener('click', e => {
  if (selectedPiece) return; // placement mode takes priority
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  if (!gameOver && wavePhase === 'build' && hitWaveButton(sx, sy)) { startWave(); return; }
  if (selectedCounter === 'lightning') { activateLightning(sx, sy); return; }
  if (selectedCounter === 'hole')      { activateHole(sx, sy); return; }
  if (selectedCounter === 'metal')     { activateLure(sx, sy); return; }
  if (selectedCounter === 'cleaner')   { activateCleaner(sx, sy); return; }
  tryScareEnemy(sx, sy);
});
canvas.addEventListener('touchend', e => {
  if (selectedPiece) return;
  const rect = canvas.getBoundingClientRect();
  const t = e.changedTouches[0];
  const sx = t.clientX - rect.left;
  const sy = t.clientY - rect.top;
  if (!gameOver && wavePhase === 'build' && hitWaveButton(sx, sy)) { startWave(); return; }
  if (selectedCounter === 'lightning') { activateLightning(sx, sy); return; }
  if (selectedCounter === 'hole')      { activateHole(sx, sy); return; }
  if (selectedCounter === 'metal')     { activateLure(sx, sy); return; }
  if (selectedCounter === 'cleaner')   { activateCleaner(sx, sy); return; }
  tryScareEnemy(sx, sy);
});

function tryScareEnemy(sx, sy) {
  // Birds are handled by lightning countermeasure — skip them here
  let best = null, bestDist = 32;
  for (const e of enemies) {
    if (e.state !== 'active') continue;
    if (e.type === 'bird') continue; // birds: use lightning counter
    const sp = iso(e.col, e.row, 0);
    const d  = Math.sqrt((sp.x-sx)**2 + (sp.y-sy)**2);
    if (d < bestDist) { bestDist = d; best = e; }
  }
  if (best) {
    best.hp--;
    if (best.hp <= 0) {
      best.state = 'scared';
      best.scaredTimer = 0;
    }
  }
}

// ── DRAW ENEMIES ──────────────────────────────────────────────────
function drawEnemies() {
  // Sort enemies by depth like everything else
  const sorted = [...enemies].sort((a,b) => {
    const ra = rotateGrid(a.col, a.row);
    const rb = rotateGrid(b.col, b.row);
    return (ra.col+ra.row) - (rb.col+rb.row);
  });
  for (const e of sorted) {
    if (e.type === 'crab')    drawCrab(e);
    if (e.type === 'tourist') drawTourist(e);
    if (e.type === 'bird')    drawBird(e);
    if (e.type === 'bob')     drawBob(e);
  }
  drawPoopSplats(); // splats drawn after enemies so they sit on top of ground
}

// ── DRAW CRAB ─────────────────────────────────────────────────────
function drawCrab(e) {
  const sp     = iso(e.col, e.row, 0.05);
  const s      = e.size * (camZoom * 0.9);
  const leg    = Math.sin(e.legPhase) * 4 * s;
  const scared = e.state === 'scared';

  // Drying out: shell goes pale/bleached as landTimer rises
  const dryRatio  = Math.min(1, (e.landTimer||0) / ENEMY_CRAB_LAND_LIMIT);
  const shellColor  = scared ? '#ff6644' :
    `rgb(${Math.round(212 + dryRatio*40)},${Math.round(64 - dryRatio*20)},${Math.round(32 - dryRatio*20)})`;
  const shellHiColor = scared ? '#ff9977' :
    `rgb(${Math.round(232 + dryRatio*20)},${Math.round(96 + dryRatio*80)},${Math.round(64 + dryRatio*100)})`;

  ctx.save();
  ctx.translate(sp.x, sp.y);
  if (scared && Math.floor(tick/4)%2===0) ctx.globalAlpha = 0.5;

  // Flash pale/white when nearly dried out
  if (dryRatio > 0.7 && Math.floor(tick/8)%2===0) ctx.globalAlpha = 0.6;

  // Legs
  ctx.strokeStyle = scared ? '#ff8866' : `rgb(${Math.round(200+dryRatio*55)},${Math.round(64+dryRatio*60)},${Math.round(32+dryRatio*40)})`;
  ctx.lineWidth = 1.2 * s;
  for (let i = -1; i <= 1; i += 2) {
    ctx.beginPath(); ctx.moveTo(-4*s, 0); ctx.lineTo(-10*s*i, -3*s+leg*i*0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 4*s, 0); ctx.lineTo( 10*s*i,  3*s-leg*i*0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -2*s); ctx.lineTo(-8*s*i, -7*s+leg*i);      ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,  2*s); ctx.lineTo( 8*s*i,  7*s-leg*i);      ctx.stroke();
  }

  // Body
  ctx.fillStyle = shellColor;
  ctx.beginPath(); ctx.ellipse(0, 0, 7*s, 5*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = shellHiColor;
  ctx.beginPath(); ctx.ellipse(-1*s, -1*s, 4*s, 3*s, -0.3, 0, Math.PI*2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#1a0800';
  ctx.beginPath(); ctx.arc(-3*s, -6*s, 1.5*s, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 3*s, -6*s, 1.5*s, 0, Math.PI*2); ctx.fill();

  // Claws
  ctx.fillStyle = scared ? '#ff5533' : `rgb(${Math.round(192+dryRatio*60)},${Math.round(48+dryRatio*60)},${Math.round(16+dryRatio*40)})`;
  ctx.beginPath(); ctx.ellipse(-12*s, -2*s, 4*s, 2.5*s,  0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 12*s, -2*s, 4*s, 2.5*s, -0.4, 0, Math.PI*2); ctx.fill();

  // Drying-out bar — small blue→orange strip above crab when on land
  if (dryRatio > 0 && !scared) {
    const bw = 14*s, bh = 2*s;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(-bw/2, -18*s, bw, bh);
    const barColor = dryRatio < 0.5 ? '#40aaff' : dryRatio < 0.8 ? '#ffaa20' : '#ff3020';
    ctx.fillStyle = barColor;
    ctx.fillRect(-bw/2, -18*s, bw*(1-dryRatio), bh);
  }

  // HP pips
  for (let i = 0; i < e.hp; i++) {
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath(); ctx.arc(-4*s + i*5*s, -22*s, 2*s, 0, Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

// ── DRAW TOURIST ──────────────────────────────────────────────────
function drawTourist(e) {
  const sp     = iso(e.col, e.row, 0.05);
  const s      = camZoom * 0.9;
  const walk   = Math.sin(e.walkPhase) * 3 * s;
  const scared = e.state === 'scared';
  const facingLeft = e.dirC < 0;

  ctx.save();
  ctx.translate(sp.x, sp.y);
  if (facingLeft) ctx.scale(-1, 1);
  if (scared && Math.floor(tick/4)%2===0) ctx.globalAlpha = 0.5;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(0, 4*s, 7*s, 3*s, 0, 0, Math.PI*2); ctx.fill();

  // Legs — walking animation
  ctx.strokeStyle = '#3a6abf'; // blue shorts/pants
  ctx.lineWidth = 3*s;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-2*s, 4*s); ctx.lineTo(-3*s, 14*s + walk); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 2*s, 4*s); ctx.lineTo( 3*s, 14*s - walk); ctx.stroke();

  // Shoes
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.ellipse(-3*s, 15*s + walk, 4*s, 2*s, 0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 3*s, 15*s - walk, 4*s, 2*s, 0.2, 0, Math.PI*2); ctx.fill();

  // Body — Hawaiian shirt
  ctx.fillStyle = scared ? '#ff9955' : '#e05c22';
  ctx.beginPath();
  ctx.roundRect(-5*s, -6*s, 10*s, 12*s, 2*s);
  ctx.fill();
  // Shirt pattern dots
  ctx.fillStyle = '#f8e050';
  for (let py = -4; py <= 2; py += 3) {
    for (let px = -3; px <= 3; px += 3) {
      ctx.beginPath();
      ctx.arc(px*s, py*s, 0.8*s, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Arms
  ctx.strokeStyle = '#d4845a';
  ctx.lineWidth = 2.5*s;
  if (e.phone) {
    // Phone arm raised
    ctx.beginPath(); ctx.moveTo(5*s, -4*s); ctx.lineTo(10*s, -10*s); ctx.stroke();
    // Phone
    ctx.fillStyle = '#222';
    ctx.fillRect(8*s, -14*s, 5*s, 8*s);
    ctx.fillStyle = '#88ccff';
    ctx.fillRect(9*s, -13*s, 3*s, 6*s);
    // Other arm swinging
    ctx.strokeStyle = '#d4845a'; ctx.lineWidth = 2.5*s;
    ctx.beginPath(); ctx.moveTo(-5*s, -4*s); ctx.lineTo(-9*s, -2*s + walk); ctx.stroke();
  } else {
    // Both arms swinging
    ctx.beginPath(); ctx.moveTo( 5*s, -4*s); ctx.lineTo( 9*s, -2*s - walk); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-5*s, -4*s); ctx.lineTo(-9*s, -2*s + walk); ctx.stroke();
  }

  // Head
  ctx.fillStyle = '#d4845a';
  ctx.beginPath(); ctx.arc(0, -10*s, 5*s, 0, Math.PI*2); ctx.fill();

  // Hat — sun visor
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(-6*s, -16*s, 12*s, 3*s);
  ctx.fillStyle = '#e05c22';
  ctx.fillRect(-5*s, -17*s, 10*s, 2*s);

  // Sunglasses
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath(); ctx.ellipse(-2*s, -10*s, 2.5*s, 1.8*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 2*s, -10*s, 2.5*s, 1.8*s, 0, 0, Math.PI*2); ctx.fill();

  // HP pips
  for (let i = 0; i < e.hp; i++) {
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.arc(-4*s + i*5*s, -22*s, 2*s, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

// ── BIRD & BOB CONSTANTS ─────────────────────────────────────────
const ENEMY_BIRD_SPAWN_RATE  = 600;  // ← ticks between bird flock spawns (~10s at 60fps)
const ENEMY_BOB_SPAWN_RATE   = 900;  // ← ticks between Bob spawns (~15s at 60fps)
const ENEMY_BIRD_MAX         = 4;    // ← max birds at once
const ENEMY_BOB_MAX          = 1;    // ← only one Bob at a time
const ENEMY_BIRD_POOP_RATE   = 220;  // ← ticks between poop drops per bird
const ENEMY_BOB_DAMAGE_RATE  = 200;  // ← ticks per 1 HP damage from Bob's detector
const BIRD_POOP_DAMAGE_RATE  = 150;  // ← ticks per HP lost to active poop splat

let birdSpawnTimer = 0;
let bobSpawnTimer  = 0;
const poopSplats   = []; // active poop splats on the ground: {col,row,timer,target}

// ── BIRD SPAWNER ─────────────────────────────────────────────────
function spawnBird() {
  // Spawn from a random screen edge, fly toward castle then circle
  const side = Math.floor(Math.random() * 4);
  let col, row;
  if (side === 0) { col = Math.random() * GCOLS; row = -1; }
  else if (side === 1) { col = GCOLS+1; row = Math.random() * GROWS; }
  else if (side === 2) { col = Math.random() * GCOLS; row = GROWS+1; }
  else { col = -1; row = Math.random() * GROWS; }

  enemies.push({
    type:       'bird',
    col, row,
    hp:         ENEMY_SCARE_HP,
    state:      'active',
    scaredTimer: 0,
    wingPhase:  Math.random() * Math.PI * 2,
    orbitAngle: Math.random() * Math.PI * 2, // angle around castle
    orbitRadius: 2.5 + Math.random() * 1.5,  // how wide the circle
    orbitSpeed: 0.018 + Math.random() * 0.01,// how fast it circles
    altitude:   1.2 + Math.random() * 0.6,   // z height above grid
    poopTimer:  Math.floor(Math.random() * ENEMY_BIRD_POOP_RATE),
    arriving:   true, // still flying in to castle
  });
}

// ── BOB SPAWNER ───────────────────────────────────────────────────
// Bob spawns from the beach edge and wanders toward the castle.
function spawnBob() {
  const fromLeft = Math.random() < 0.5;
  enemies.push({
    type:        'bob',
    col:          fromLeft ? 0.5 : GCOLS - 1.5,
    row:          4 + Math.random() * 5,
    hp:           ENEMY_SCARE_HP,
    state:        'active',
    scaredTimer:  0,
    walkPhase:    0,
    detectorAngle: 0,        // swing animation
    damageTimer:  0,
    wanderAngle:  fromLeft ? 0 : Math.PI, // general heading
    wanderTimer:  0,
    speed:        0.003 + Math.random() * 0.002, // slow old man walk
    beeping:      false,     // true when near a piece
  });
}

// ── BIRD TICK ────────────────────────────────────────────────────
function tickBird(e, i) {
  e.wingPhase += 0.15;

  if (e.state === 'scared') {
    e.scaredTimer++;
    e.altitude += 0.04; // fly up and away
    e.col += (Math.random()-0.5) * 0.06;
    e.row -= 0.05;
    if (e.scaredTimer > 60 || e.row < -2) { enemies.splice(i, 1); }
    return;
  }

  if (e.arriving) {
    // Fly toward orbit position around castle
    const targetC = ORBIT_PIVOT_C + Math.cos(e.orbitAngle) * e.orbitRadius;
    const targetR = ORBIT_PIVOT_R + Math.sin(e.orbitAngle) * e.orbitRadius * 0.5;
    const dc = targetC - e.col, dr = targetR - e.row;
    const dist = Math.sqrt(dc*dc+dr*dr)||1;
    e.col += (dc/dist) * 0.06;
    e.row += (dr/dist) * 0.03;
    if (dist < 0.5) e.arriving = false;
    return;
  }

  // Circle the castle
  e.orbitAngle += e.orbitSpeed;
  e.col = ORBIT_PIVOT_C + Math.cos(e.orbitAngle) * e.orbitRadius;
  e.row = ORBIT_PIVOT_R + Math.sin(e.orbitAngle) * e.orbitRadius * 0.5;

  // Poop drop
  e.poopTimer++;
  if (e.poopTimer >= ENEMY_BIRD_POOP_RATE) {
    e.poopTimer = 0;
    // Drop poop at current position — lands on nearest piece or castle tile
    const target = nearestPiece(e.col, e.row, 3);
    const landCol = target ? target.col : Math.round(e.col);
    const landRow = target ? target.row : Math.round(e.row);
    poopSplats.push({
      col: landCol, row: landRow,
      timer: 0,
      target: target || null,
      alpha: 1,
    });
  }
}

// ── POOP SPLAT TICK ───────────────────────────────────────────────
function tickPoopSplats() {
  for (let i = poopSplats.length - 1; i >= 0; i--) {
    const p = poopSplats[i];
    p.timer++;
    // Damage the target piece while splat is active
    if (p.target && p.timer % BIRD_POOP_DAMAGE_RATE === 0) {
      if (p.target.health > 0) {
        p.target.health = Math.max(0, p.target.health - 1);
      } else {
        // Piece crumbled — damage castle
        damageCastle();
      }
    }
    // Poop splat fades after ~8 seconds then disappears
    if (p.timer > 480) {
      p.alpha = Math.max(0, p.alpha - 0.02);
      if (p.alpha <= 0) poopSplats.splice(i, 1);
    }
  }
}

// ── BOB TICK ─────────────────────────────────────────────────────
function tickBob(e, i) {
  e.walkPhase    += 0.08;
  e.detectorAngle = Math.sin(tick * 0.06) * 0.6; // swing detector

  if (e.state === 'scared') {
    e.scaredTimer++;
    // Bob shuffles away faster than usual
    const dc = e.col - ORBIT_PIVOT_C, dr = e.row - ORBIT_PIVOT_R;
    const dist = Math.sqrt(dc*dc+dr*dr)||1;
    e.col += (dc/dist) * e.speed * 3;
    e.row += (dr/dist) * e.speed * 3;
    if (e.scaredTimer >= ENEMY_SCARED_DURATION ||
        e.col < -1 || e.col > GCOLS+1) {
      enemies.splice(i, 1);
    }
    return;
  }

  // ── Lure — if a metal lure exists, Bob beelines for it instead of the
  // castle and does no piece/castle damage while it's out ──────────────
  if (lures.length > 0) {
    const lure = lures[0];
    const lc = lure.col - e.col, lr = lure.row - e.row;
    const lDist = Math.sqrt(lc*lc + lr*lr) || 1;
    if (lDist < 0.8) {
      lure.timer++;
      if (lure.timer >= 300) {
        lures.splice(lures.indexOf(lure), 1);
        e.state = 'scared';
        e.scaredTimer = 0;
      }
    } else {
      e.col += (lc/lDist) * e.speed;
      e.row += (lr/lDist) * e.speed;
    }
    return;
  }

  // Wander slowly toward castle with gentle random drift
  e.wanderTimer++;
  if (e.wanderTimer > 120) {
    // Occasionally nudge direction toward castle
    const dc = ORBIT_PIVOT_C - e.col, dr = ORBIT_PIVOT_R - e.row;
    e.wanderAngle = Math.atan2(dr, dc) + (Math.random()-0.5) * 1.2;
    e.wanderTimer = 0;
  }

  // Water avoidance
  const nextC = e.col + Math.cos(e.wanderAngle) * e.speed * 4;
  const nextR = e.row + Math.sin(e.wanderAngle) * e.speed * 4;
  if (!isTileWater(Math.round(nextC), Math.round(nextR))) {
    e.col += Math.cos(e.wanderAngle) * e.speed;
    e.row += Math.sin(e.wanderAngle) * e.speed;
  } else {
    e.wanderAngle += Math.PI * 0.5; // turn away from water
  }

  // Check for nearest piece — Bob beeps and damages it
  const target = nearestPiece(e.col, e.row, 1.8);
  e.beeping = !!target;

  if (target) {
    e.damageTimer++;
    if (e.damageTimer >= ENEMY_BOB_DAMAGE_RATE) {
      target.health = Math.max(0, target.health - 1);
      e.damageTimer = 0;
    }
  } else {
    // Near castle center with no pieces — damage castle
    const distToCenter = Math.sqrt(
      (e.col-ORBIT_PIVOT_C)**2 + (e.row-ORBIT_PIVOT_R)**2
    );
    if (distToCenter < 1.2) {
      e.damageTimer++;
      if (e.damageTimer >= ENEMY_BOB_DAMAGE_RATE) {
        damageCastle();
        e.damageTimer = 0;
      }
    } else {
      e.damageTimer = Math.max(0, e.damageTimer - 1);
    }
  }
}

// ── DRAW BIRD ────────────────────────────────────────────────────
function drawBird(e) {
  const sp     = iso(e.col, e.row, e.altitude);
  const s      = camZoom * 0.85;
  const wing   = Math.sin(e.wingPhase) * 6 * s;
  const scared = e.state === 'scared';

  ctx.save();
  ctx.translate(sp.x, sp.y);
  if (scared && Math.floor(tick/4)%2===0) ctx.globalAlpha = 0.5;

  // Shadow on ground below
  const groundSp = iso(e.col, e.row, 0);
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(groundSp.x - sp.x, groundSp.y - sp.y, 8*s, 4*s, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Wings
  ctx.fillStyle = scared ? '#aaaacc' : '#555566';
  // Left wing
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-5*s, -wing, -14*s, -wing*0.5, -16*s, 2*s);
  ctx.bezierCurveTo(-10*s, 1*s, -4*s, 0, 0, 0);
  ctx.fill();
  // Right wing
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(5*s, -wing, 14*s, -wing*0.5, 16*s, 2*s);
  ctx.bezierCurveTo(10*s, 1*s, 4*s, 0, 0, 0);
  ctx.fill();

  // Body
  ctx.fillStyle = scared ? '#bbbbdd' : '#666677';
  ctx.beginPath(); ctx.ellipse(0, 1*s, 4*s, 3*s, 0, 0, Math.PI*2); ctx.fill();

  // Head
  ctx.fillStyle = scared ? '#ccccee' : '#777788';
  ctx.beginPath(); ctx.arc(0, -3*s, 3*s, 0, Math.PI*2); ctx.fill();

  // Beak
  ctx.fillStyle = '#e8c040';
  ctx.beginPath();
  ctx.moveTo(3*s, -3*s);
  ctx.lineTo(8*s, -2*s);
  ctx.lineTo(3*s, -1*s);
  ctx.closePath(); ctx.fill();

  // Eye
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(1.5*s, -4*s, 1.2*s, 0, Math.PI*2); ctx.fill();

  // HP pips
  for (let j = 0; j < e.hp; j++) {
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath(); ctx.arc(-4*s + j*5*s, -12*s, 1.8*s, 0, Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

// ── DRAW POOP SPLAT ───────────────────────────────────────────────
function drawPoopSplats() {
  for (const p of poopSplats) {
    const sp = iso(p.col + 0.5, p.row + 0.5, 0.08);
    ctx.save();
    ctx.globalAlpha = p.alpha * 0.85;
    // Splat shape — irregular blob
    ctx.fillStyle = '#e8e0b0';
    ctx.beginPath();
    ctx.ellipse(sp.x, sp.y, 9, 5, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#d4cc90';
    ctx.beginPath();
    ctx.ellipse(sp.x+3, sp.y-2, 5, 3, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c8c080';
    ctx.beginPath();
    ctx.ellipse(sp.x-4, sp.y+1, 4, 2.5, 0.8, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── DRAW BOB ────────────────────────────────────────────────────
function drawBob(e) {
  const sp     = iso(e.col, e.row, 0.05);
  const s      = camZoom * 0.9;
  const walk   = Math.sin(e.walkPhase) * 2.5 * s;
  const scared = e.state === 'scared';

  ctx.save();
  ctx.translate(sp.x, sp.y);
  if (scared && Math.floor(tick/4)%2===0) ctx.globalAlpha = 0.5;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(0, 5*s, 8*s, 3*s, 0, 0, Math.PI*2); ctx.fill();

  // Legs — slow shuffle
  ctx.strokeStyle = '#4a4a6a'; ctx.lineWidth = 3*s; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-2*s, 4*s); ctx.lineTo(-3*s, 15*s + walk); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 2*s, 4*s); ctx.lineTo( 3*s, 15*s - walk); ctx.stroke();

  // Shoes — old man velcro sneakers
  ctx.fillStyle = '#e8e8e8';
  ctx.beginPath(); ctx.ellipse(-3*s, 16*s+walk, 5*s, 2.5*s, 0.15, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 3*s, 16*s-walk, 5*s, 2.5*s, 0.15, 0, Math.PI*2); ctx.fill();

  // Shorts — khaki
  ctx.fillStyle = scared ? '#c8b870' : '#d4c878';
  ctx.beginPath(); ctx.roundRect(-5*s, 2*s, 10*s, 6*s, 1*s); ctx.fill();

  // Shirt — polo
  ctx.fillStyle = scared ? '#7090c8' : '#5080c0';
  ctx.beginPath(); ctx.roundRect(-5*s, -6*s, 10*s, 10*s, 2*s); ctx.fill();
  // Collar
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.moveTo(-2*s,-6*s); ctx.lineTo(0,-10*s); ctx.lineTo(2*s,-6*s); ctx.closePath(); ctx.fill();

  // Arms
  ctx.strokeStyle = '#d4a070'; ctx.lineWidth = 2.5*s; ctx.lineCap = 'round';
  // Left arm holds detector
  ctx.beginPath(); ctx.moveTo(-5*s,-4*s); ctx.lineTo(-12*s, 4*s + walk*0.3); ctx.stroke();
  // Right arm swings
  ctx.beginPath(); ctx.moveTo( 5*s,-4*s); ctx.lineTo( 9*s, 2*s - walk*0.5); ctx.stroke();

  // Metal detector — rod + disk
  const detRot = e.detectorAngle;
  ctx.save();
  ctx.translate(-12*s, 4*s + walk*0.3);
  ctx.rotate(detRot);
  // Rod
  ctx.strokeStyle = '#909090'; ctx.lineWidth = 1.5*s;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-8*s, 10*s); ctx.stroke();
  // Disk
  ctx.strokeStyle = e.beeping ? '#ffdd00' : '#606060';
  ctx.lineWidth = 2*s;
  ctx.beginPath(); ctx.ellipse(-8*s, 11*s, 5*s, 2.5*s, 0.3, 0, Math.PI*2); ctx.stroke();
  // Beep flash
  if (e.beeping && Math.floor(tick/8)%2===0) {
    ctx.fillStyle = 'rgba(255,220,0,0.4)';
    ctx.beginPath(); ctx.ellipse(-8*s, 11*s, 8*s, 4*s, 0.3, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // Head
  ctx.fillStyle = '#d4a070';
  ctx.beginPath(); ctx.arc(0, -10*s, 5*s, 0, Math.PI*2); ctx.fill();

  // Bald head shine
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.ellipse(-1*s, -13*s, 2.5*s, 1.5*s, -0.3, 0, Math.PI*2); ctx.fill();

  // Sun hat — wide brim
  ctx.fillStyle = '#c8a840';
  ctx.beginPath(); ctx.ellipse(0, -15*s, 8*s, 2.5*s, 0, 0, Math.PI*2); ctx.fill(); // brim
  ctx.fillStyle = '#d4b848';
  ctx.beginPath(); ctx.roundRect(-4*s, -19*s, 8*s, 5*s, 1*s); ctx.fill(); // crown

  // Glasses
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.2*s;
  ctx.beginPath(); ctx.arc(-2*s, -10*s, 2*s, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc( 2*s, -10*s, 2*s, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -10*s); ctx.lineTo(0, -10*s); ctx.stroke(); // nose bridge
  ctx.beginPath(); ctx.moveTo(-4*s,-10*s); ctx.lineTo(-6*s,-9*s); ctx.stroke(); // left arm
  ctx.beginPath(); ctx.moveTo( 4*s,-10*s); ctx.lineTo( 6*s,-9*s); ctx.stroke(); // right arm

  // HP pips
  for (let j = 0; j < e.hp; j++) {
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath(); ctx.arc(-4*s + j*5*s, -24*s, 2*s, 0, Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════
// END MODULE 9
// ═══════════════════════════════════════════════════════════════════



function render() {
  tick++;
  // ── Smooth camera angle and zoom toward destinations ───────────
  camAngle += (camAngleDest - camAngle) * ORBIT_SMOOTH;
  camZoom  += (camZoomDest  - camZoom)  * ZOOM_SMOOTH;
  tidePhase += tideSpeed;
  edgeTime  += 0.0007;

  const curSign = Math.cos(tidePhase) > 0 ? 1 : -1;
  if (curSign === 1 && lastTideSign === -1) randomizeTideCycle();
  lastTideSign = curSign;

  const targetD = tidePeak + getTideT() * (SHORE_LOW - tidePeak);
  shoreD += (targetD - shoreD) * 0.004;

  waveTimer++;
  if (waveTimer >= nextWaveIn) { spawnWave(); waveTimer = 0; }
  for (let i = waveRings.length - 1; i >= 0; i--) {
    waveRings[i].r     += waveRings[i].speed;
    waveRings[i].alpha -= waveRings[i].decay;
    if (waveRings[i].alpha <= 0) waveRings.splice(i, 1);
  }

  if(tick%3===0) buildWaterTex(tick*0.011);

  ctx.clearRect(0,0,SW,SH);
  drawSky();

  // Build all tiles and sort by rotated depth each frame
  const allTiles = [];
  for(let col=0; col<GCOLS; col++)
    for(let row=0; row<GROWS; row++) {
      const r = rotateGrid(col+0.5, row+0.5);
      allTiles.push({ col, row, depth: r.col + r.row });
    }
  allTiles.sort((a,b) => a.depth - b.depth);

  for(const {col, row} of allTiles){

      if(isTileWater(col,row)){
        ctx.save();
        clipTilePath(col,row); ctx.clip();
        ctx.drawImage(wCanvas,0,0);
        ctx.restore();
        ctx.save();
        clipTilePath(col,row);
        ctx.strokeStyle='rgba(10,30,60,0.18)'; ctx.lineWidth=0.8;
        ctx.stroke();
        ctx.restore();
      } else {
        const wet = isShore(col,row);
        ctx.save();
        clipTilePath(col,row); ctx.clip();
        if(wet){
          ctx.drawImage(sCanvas,0,0);
          ctx.fillStyle='rgba(40,80,120,0.22)'; ctx.fill();
        } else {
          ctx.drawImage(sCanvas,0,0);
        }
        ctx.restore();

        waveRings.forEach(ring=>{
          const dp = iso(ring.col+ring.r*1.4, ring.row+ring.r, 0.02);
          const rsx = ring.r * TW() * 0.9;
          const rsy = ring.r * TH() * 0.9;
          if(rsx<2) return;
          ctx.save();
          clipTilePath(col,row); ctx.clip();
          ctx.globalAlpha = ring.alpha*0.38;
          ctx.strokeStyle='#a8d8f8'; ctx.lineWidth=2;
          ctx.beginPath();
          ctx.ellipse(dp.x, dp.y, rsx, rsy*0.5, -0.5, 0, Math.PI*2);
          ctx.stroke();
          ctx.globalAlpha=1;
          ctx.restore();
        });
      }

      if(isShore(col,row)){
        drawFoamOnTile(col,row,tick);
      }
    }  // end allTiles loop

  drawMoat(tick);
  drawCastle(tick);
  tickDeterioration();  // ← decay placed pieces each frame

  if (!gameOver) {
    tickEnemies();      // ← move + attack enemies
  }

  drawHoles();            // ← crab-trap pits, drawn before placed pieces
  drawPlacedPieces();     // ← draw with health-based visuals
  drawEnemies();          // ← draw enemies on top
  drawLures();            // ← Bob-lure coin clusters
  drawTruck();            // ← cleaner truck, if active
  drawLightningStrikes(); // ← countermeasure bolt animations
  drawCastleHUD();        // ← castle HP bar upper-left
  if (!gameOver && wavePhase === 'build') drawWaveButton();

  if (gameOver) {
    drawGameOver();     // ← game over overlay
  }

  const tl=getTideT(), dir=Math.cos(tidePhase)>0?'rising':'falling';
  const orbitHint = selectedPiece ? '' : '  |  drag to orbit';
  hud.textContent=`tide: ${dir} · ${Math.round(tl*100)}%  |  waves: ${waveRings.length}  |  ${orbitHudStr()}  |  zoom: ${camZoom.toFixed(1)}x${orbitHint}`;

  // Ghost cursor — selected toolbox piece follows mouse on grid
  drawGhost(tick);

  requestAnimationFrame(render);
}

buildWaterTex(0);
randomizeTideCycle();
spawnWave(); spawnWave(); spawnWave();
let tick = 0;
render();
</script>
